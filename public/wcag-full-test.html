<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>WCAG Test - Fixed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }
      .pass {
        background: #e6fffa;
        padding: 10px;
        margin: 10px;
      }
      .fail {
        background: #ffe6e6;
        padding: 10px;
        margin: 10px;
      }
      .low {
        color: #aaa;
      }
      .good {
        color: #000;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>WCAG Test Page (Isolated)</h1>
    </header>

    <!-- ✅ PASS SECTION -->
    <main id="pass-region">
      <h2>✅ PASS CASES</h2>

      <!-- image-alt -->
      <div class="pass">
        <img
          src="https://via.placeholder.com/100"
          alt="Valid image description"
        />
      </div>

      <!-- contrast -->
      <div class="pass">
        <p class="good">Good contrast text</p>
      </div>

      <!-- heading -->
      <div class="pass">
        <h1>Main</h1>
        <h2>Sub</h2>
      </div>

      <!-- button -->
      <div class="pass">
        <button>Accessible Button</button>
      </div>

      <!-- link -->
      <div class="pass">
        <a href="#">View report details</a>
      </div>

      <!-- label -->
      <div class="pass">
        <label for="name">Name</label>
        <input id="name" type="text" />
      </div>

      <!-- aria -->
      <div class="pass">
        <button aria-label="Close">X</button>
      </div>

      <!-- unique id -->
      <div class="pass">
        <div id="u1">A</div>
        <div id="u2">B</div>
      </div>
    </main>

    <!-- ❌ FAIL SECTION -->
    <div id="fail-region">
      <h2>❌ FAIL CASES</h2>

      <!-- image-alt -->
      <div class="fail">
        <img src="https://via.placeholder.com/100" />
      </div>

      <!-- contrast -->
      <div class="fail">
        <p class="low">Bad contrast text</p>
      </div>

      <!-- heading -->
      <div class="fail">
        <h4>Wrong heading order</h4>
      </div>

      <!-- keyboard -->
      <div class="fail">
        <div onclick="alert('clicked')">Clickable div</div>
      </div>

      <!-- link -->
      <div class="fail">
        <a href="#">Click here</a>
      </div>

      <!-- label -->
      <div class="fail">
        <input type="text" />
      </div>

      <!-- aria -->
      <div class="fail">
        <div role="invalid-role"></div>
      </div>

      <!-- duplicate id -->
      <div class="fail">
        <div id="dup">A</div>
        <div id="dup">B</div>
      </div>
    </div>
  </body>
</html>
